name: Release VioraEDA
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential cmake \
            qt6-base-dev qt6-charts-dev qt6-svg-dev qt6-tools-dev \
            libgl1-mesa-dev \
            llvm-21-dev libclang-21-dev \
            libcurl4-openssl-dev \
            python3 python3-pip \
            libfuse2

      - name: Install linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Configure (prebuilt deps)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DVIOSPICE_DEV_MODE=OFF

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure || true

      - name: Package AppImage
        run: |
          mkdir -p AppDir/usr/bin
          cp build/viora AppDir/usr/bin/
          cp -r build/cm AppDir/usr/
          cd AppDir
          ln -s usr/bin/viora AppRun
          cd ..
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            --plugin qt \
            --output appimage

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: VioraEDA-*.AppImage
