name: Build VioMATRIXC
on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool \
            flex bison gcc g++ make

      - name: Bootstrap
        run: ./autogen.sh

      - name: Configure
        run: |
          mkdir -p install
          ./configure --with-ngshared --enable-cider --enable-vicompat \
            --prefix=$PWD/install

      - name: Build
        run: make -j$(nproc)

      - name: Install to staging dir
        run: |
          make install
          # Also copy code models
          mkdir -p install/cm
          for d in analog digital spice2poly tlines xtradev xtraevt; do
            [ -f "src/xspice/icm/$d/$d.cm" ] && \
              cp "src/xspice/icm/$d/$d.cm" install/cm/
          done

      - name: Package tarball
        run: |
          cd install
          tar czf ../viomatrixc-linux-x86_64.tar.gz \
            include/ lib/ cm/

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: viomatrixc-linux-x86_64.tar.gz
